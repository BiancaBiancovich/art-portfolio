<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расценки | АРТ-ПОРТФОЛИО</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #a6a6a6;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }
        
        /* КНОПКИ */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background-color: #e0e0e0;
            color: black;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            text-decoration: none;
            text-align: center;
        }
        .btn:hover {
            transform: scale(1.05);
        }

        /* ГОРИЗОНТАЛЬНЫЙ БЛОК */
        .horizontal-block {
            margin: 0 20px 20px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            background-color: #fff;
        }
        .block-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 30px 20px;
        }
        .block-image {
            margin-bottom: -100px;
            width: 280px;
            height: auto;
            border-radius: 12px;
            flex-shrink: 0;
            display: block;
        }
        .text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }
        .welcome {
            font-size: 1rem;
            font-weight: normal;
            color: #555;
            margin: 0;
            letter-spacing: 1px;
        }
        .site-title {
            font-size: 3.5rem;
            font-weight: bold;
            color: #222;
            margin: 0;
            line-height: 1.1;
        }
        .artist-title {
            font-size: 1.3rem;
            font-weight: 500;
            color: #444;
            margin: 0;
        }
        @media (max-width: 700px) {
            .block-image { margin-left: 0; width: 40%; }
            .block-content { gap: 20px; padding: 20px; flex-wrap: wrap; }
            .site-title { font-size: 2rem; }
            .artist-title { font-size: 1rem; }
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР ДЛЯ ПРАЙС-ЛИСТА, ОПЛАТЫ И ФОРМЫ */
        .prices-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        .price-card, .payment-card, .booking-card {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
        }

        /* ПРАЙС-ЛИСТ  */
        .price-card {
            flex: 2;
            min-width: 250px;
        }
        .price-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 12px 0;
            font-size: 1.1rem;
        }
        .price-item:last-child {
            border-bottom: none;
        }
        .service-name {
            font-weight: bold;
            color: #111;
        }
        .service-price {
            color: #333;
        }

        /* СПОСОБЫ ОПЛАТЫ */
        .payment-card {
            flex: 1;
            min-width: 220px;
        }
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .payment-method {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
        }
        .payment-icon {
            font-size: 2rem;
        }

        /* АДАПТИВ */
        @media (max-width: 900px) {
            .prices-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="buttons-container">
        <a href="index.html" class="btn">На главную</a>
        <a href="gallery.html" class="btn">Галерея</a>
        <button class="btn" style="opacity:0.7;">Расценки</button>
    </div>

    <div class="horizontal-block">
        <div class="block-content">
            <img class="block-image" src="https://f2.toyhou.se/file/f2-toyhou-se/images/111065288_QzpGPoxOpCgbr9l.png" alt="Маскот">
            <div class="text-group">
                <p class="welcome">прайс-лист</p>
                <h1 class="site-title">Услуги и цены</h1>
            </div>
        </div>
    </div>

    <div class="prices-container">
        <!-- Блок с прайс-листом -->
        <div class="price-card">
            <div class="subheading" style="border-left-color:#4CAF50;">Стоимость работ</div>
            <div class="price-item">
                <span class="service-name">Бюст (скетч)</span>
                <span class="service-price">x ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Бюст (полноценка)</span>
                <span class="service-price">x ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Полтела (скетч)</span>
                <span class="service-price">x ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Полтела (полноценка)</span>
                <span class="service-price">x ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Полный рост (скетч)</span>
                <span class="service-price">x ₽</span>
            </div>
            <div class="price-item">
                <span class="service-name">Полный рост (полноценка</span>
                <span class="service-price">x ₽</span>
            </div>
        </div>

        <!-- Способы оплаты (потом поменяю эмодзи на картинки) -->
        <div class="payment-card">
            <div class="subheading" style="border-left-color:#ff9800;">Способы оплаты</div>
            <div class="payment-methods">
                <div class="payment-method">
                    <span class="payment-icon">💳</span>
                    <span>глупые человечешки обнаглели</span>
                </div>
                <div class="payment-method">
                    <span class="payment-icon">📱</span>
                    <span>Lorem Ipsum</span>
                </div>
                <div class="payment-method">
                    <span class="payment-icon">🪙</span>
                    <span>Lorem Ipsum</span>
                </div>
                <div class="payment-method">
                    <span class="payment-icon">📞</span>
                    <span>Lorem Ipsum</span>
                </div>
            </div>
        </div>

</body>
</html>
