<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расценки | АРТ-ПОРТФОЛИО</title>
    <style>
        /* ОБЩИЕ СТИЛИ - такое же оформление как на главной и галерее */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-attachment: fixed;
            font-family: 'Arial', sans-serif;
            background-image: url('https://d.zaix.ru/T2mk.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 179, 146, 0.55);
            backdrop-filter: blur(12px);
            z-index: -1;
            pointer-events: none;
        }

        /* КНОПКИ */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background-color: #ffd5b5; 
            color: black;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            text-align: center;
        }
        .btn:hover {
            transform: scale(1.05);
            background-color: #ff8670; 
        }
        .btn-active {
            opacity: 0.7;
            cursor: default;
        }
        .btn-active:hover {
            transform: none;
            background-color: #ffd5b5;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* БОЛЬШОЙ БЛОК */
        .horizontal-block {
            margin: 0 0 20px 0;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            z-index: 2;
            background-image: url('https://d.zaix.ru/T2mk.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            width: 100%;
        }

        .horizontal-block::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .block-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 50px 30px;
            width: 100%;
        }

        /* МАСКОТ */
        .block-image {
            margin-bottom: -50px;
            width: 460px;
            height: auto;
            border-radius: 5px;
            flex-shrink: 0;
            display: block;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.6);
        }

        .welcome {
            font-size: 1rem;
            font-weight: normal;
            color: #f9f9f9;
            margin: 0;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            backdrop-filter: blur(3px);
        }
        .site-title {
            font-size: 3.5rem;
            font-weight: bold;
            color: #ffffff;
            margin: 0;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        @media (max-width: 700px) {
            .block-image {
                margin-bottom: 0;
                width: 40%;
                min-width: 130px;
            }
            .block-content {
                gap: 20px;
                padding: 30px 20px;
                flex-wrap: wrap;
                text-align: center;
                justify-content: center;
            }
            .text-group {
                align-items: center;
                text-align: center;
            }
            .site-title {
                font-size: 2rem;
            }
            .welcome {
                font-size: 0.85rem;
            }
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР ДЛЯ ПРАЙС-ЛИСТА, ОПЛАТЫ И ФОРМЫ */
        .prices-container {
            margin: 0 0 40px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            position: relative;
            z-index: 2;
        }

        .price-card, .payment-card {
            background-color: #ffece1;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }
        .price-card:hover, .payment-card:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        /* ПРАЙС-ЛИСТ  */
        .price-card {
            flex: 2;
            min-width: 250px;
        }
        .subheading {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 0 15px 0;
            color: #111;
            border-left: 4px solid #ff8c42;
            padding-left: 12px;
        }
        .price-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 12px 0;
            font-size: 1.1rem;
        }
        .price-item:last-child {
            border-bottom: none;
        }
        .service-name {
            font-weight: bold;
            color: #111;
        }
        .service-price {
            color: #333;
        }

        /* СПОСОБЫ ОПЛАТЫ */
        .payment-card {
            flex: 1;
            min-width: 220px;
        }
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: #222;
        }
        .contact-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* АДАПТИВ */
        @media (max-width: 900px) {
            .prices-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="buttons-container">
        <a href="gallery.html" class="btn">Галерея</a>
        <a href="index.html" class="btn">Главное</a>
        <button class="btn btn-active">Расценки</button>
    </div>

    <div class="main-container">
        <div class="horizontal-block">
            <div class="block-content">
                <img class="block-image" src="https://e.radikal.host/2026/05/29/Illustration4444444444444.png" alt="Маскот">
                <div class="text-group">
                    <p class="welcome">прайс-лист</p>
                    <h1 class="site-title">Услуги и цены</h1>
                </div>
            </div>
        </div>

        <div class="prices-container">
            <!-- Блок с прайс-листом -->
            <div class="price-card">
                <div class="subheading">Стоимость работ</div>
                <div class="price-item">
                    <span class="service-name">Бюст (скетч)</span>
                    <span class="service-price">x ₽</span>
                </div>
                <div class="price-item">
                    <span class="service-name">Бюст (полноценка)</span>
                    <span class="service-price">x ₽</span>
                </div>
                <div class="price-item">
                    <span class="service-name">Полтела (скетч)</span>
                    <span class="service-price">x ₽</span>
                </div>
                <div class="price-item">
                    <span class="service-name">Полтела (полноценка)</span>
                    <span class="service-price">x ₽</span>
                </div>
                <div class="price-item">
                    <span class="service-name">Полный рост (скетч)</span>
                    <span class="service-price">x ₽</span>
                </div>
                <div class="price-item">
                    <span class="service-name">Полный рост (полноценка</span>
                    <span class="service-price">x ₽</span>
                </div>
            </div>

            <!-- Способы оплаты с иконками в строчку -->
            <div class="payment-card">
                <div class="subheading">Способы оплаты</div>
                <div class="payment-methods">
                    <div class="contact-item">
                        <img class="contact-icon" src="https://d.zaix.ru/T2oD.png" alt="email icon">
                        Т-банк
                    </div>
                    <div class="contact-item">
                        <img class="contact-icon" src="https://d.zaix.ru/T2oD.png" alt="email icon">
                        Озон
                    </div>
                    <div class="contact-item">
                        <img class="contact-icon" src="https://d.zaix.ru/T2oD.png" alt="email icon">
                        Boosty
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

<div class="fixed-bottom" style="position: fixed; bottom: 20px; right: 20px; z-index: 999;">
    <a target="_blank">
        <img src="https://e.radikal.host/2026/05/29/59946932_WsRaRKab7bAck5C125a7639edea78fe.png"
        alt="pagedoll" style="max-width: 150px; display: block; animation: spin 3s linear infinite; cursor: pointer; transition: transform 0.3s;">
    </a>
</div>

<style>
    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
    }
    
    .fixed-bottom a:hover img {
        animation: spin 1s linear infinite;
    }
</style>

</html>
